<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .primary-gradient {
            background: linear-gradient(135deg, #3755c3 0%, #001453 100%);
        }
        .tonal-elevation-1 {
            background-color: #f2f4f6; /* surface-container-low */
        }
        .tonal-elevation-2 {
            background-color: #e6e8ea; /* surface-container-high */
        }
        .ghost-border {
            outline: 1px solid rgba(198, 198, 205, 0.15);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-background": "#191c1e",
                        "surface-container-low": "#f2f4f6",
                        "outline-variant": "#c6c6cd",
                        "on-secondary-fixed-variant": "#334380",
                        "surface-container-highest": "#e0e3e5",
                        "secondary-fixed": "#dde1ff",
                        "secondary": "#4b5b9a",
                        "tertiary-container": "#4966d4",
                        "on-primary-container": "#f1f1ff",
                        "on-surface": "#191c1e",
                        "surface-container-high": "#e6e8ea",
                        "surface-bright": "#f7f9fb",
                        "on-surface-variant": "#444652",
                        "outline": "#757683",
                        "secondary-container": "#a9b8fe",
                        "on-tertiary-container": "#f2f1ff",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#00164f",
                        "surface-dim": "#d8dadc",
                        "inverse-on-surface": "#eff1f3",
                        "tertiary-fixed": "#dde1ff",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#4e69c3",
                        "on-error": "#ffffff",
                        "primary": "#3450a9",
                        "secondary-fixed-dim": "#b8c4ff",
                        "inverse-surface": "#2d3133",
                        "error-container": "#ffdad6",
                        "surface-container": "#eceef0",
                        "tertiary-fixed-dim": "#b8c4ff",
                        "on-error-container": "#93000a",
                        "surface-tint": "#3755c3",
                        "background": "#f7f9fb",
                        "on-secondary-container": "#384785",
                        "surface": "#f7f9fb",
                        "on-tertiary": "#ffffff",
                        "primary-fixed-dim": "#b6c4ff",
                        "on-tertiary-fixed-variant": "#173baa",
                        "on-tertiary-fixed": "#001453",
                        "on-primary-fixed-variant": "#214098",
                        "primary-fixed": "#dce1ff",
                        "surface-variant": "#e0e3e5",
                        "tertiary": "#2d4cba",
                        "on-secondary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#001453",
                        "inverse-primary": "#b6c4ff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    spacing: {
                        "base": "8px",
                        "container-padding": "16px",
                        "section-gap": "32px",
                        "module-gap": "24px"
                    },
                    fontFamily: {
                        "body-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "label-md": ["Inter"]
                    },
                    fontSize: {
                        "body-md": ["16px", {"lineHeight": "25.6px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-sm": ["11px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-module-gap overflow-hidden">
<!-- Blurred Background: User Management Screen -->
<div class="fixed inset-0 z-0 opacity-40 blur-xl scale-105 pointer-events-none">
<div class="w-full h-full flex">
<!-- Mock SideNav from JSON -->
<div class="h-full w-72 bg-surface-container-low"></div>
<!-- Mock Content -->
<div class="flex-1 p-section-gap space-y-module-gap">
<div class="h-16 w-1/3 bg-primary-container rounded-lg"></div>
<div class="grid grid-cols-4 gap-base">
<div class="h-12 bg-surface-container-high"></div>
<div class="h-12 bg-surface-container-high"></div>
<div class="h-12 bg-surface-container-high"></div>
<div class="h-12 bg-surface-container-high"></div>
</div>
<div class="space-y-base">
<div class="h-24 bg-surface-container-lowest rounded-lg"></div>
<div class="h-24 bg-surface-container-low rounded-lg"></div>
<div class="h-24 bg-surface-container-lowest rounded-lg"></div>
<div class="h-24 bg-surface-container-low rounded-lg"></div>
</div>
</div>
</div>
</div>
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-on-background/20 backdrop-blur-sm z-10 flex items-center justify-center">
<!-- Modal Window -->
<div class="w-full max-w-2xl bg-surface-container-lowest shadow-[0px_12px_40px_rgba(25,28,30,0.04)] rounded-lg overflow-hidden flex flex-col z-20">
<!-- Header -->
<div class="px-section-gap pt-section-gap pb-module-gap">
<div class="flex items-center justify-between mb-2">
<h2 class="font-headline-md text-headline-md text-on-surface tracking-tight">Add New User</h2>
<span class="material-symbols-outlined text-outline cursor-pointer hover:text-on-surface transition-colors">close</span>
</div>
<p class="font-label-md text-label-md text-outline uppercase tracking-widest">Identification &amp; Access Protocol</p>
</div>
<!-- Content Canvas -->
<div class="px-section-gap pb-section-gap space-y-section-gap overflow-y-auto max-h-[716px]">
<!-- Group 1: System Info (Readonly) -->
<div class="p-container-padding bg-surface-container-low rounded-lg space-y-module-gap">
<div class="flex items-center gap-base mb-2">
<span class="material-symbols-outlined text-[18px] text-primary">info</span>
<h3 class="font-label-md text-label-md text-primary uppercase">System Info</h3>
</div>
<div class="grid grid-cols-2 gap-module-gap">
<div class="space-y-1">
<label class="font-label-sm text-label-sm text-outline-variant uppercase">User ID</label>
<div class="h-12 bg-surface-container-highest px-4 flex items-center font-body-md text-on-surface-variant">#USR-9029</div>
</div>
<div class="space-y-1">
<label class="font-label-sm text-label-sm text-outline-variant uppercase">Creation Date</label>
<div class="h-12 bg-surface-container-highest px-4 flex items-center font-body-md text-on-surface-variant">Oct 24, 2024</div>
</div>
</div>
</div>
<!-- Group 2: Personal Details -->
<div class="space-y-module-gap">
<h3 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest mb-4">Personal Details</h3>
<div class="grid grid-cols-3 gap-module-gap">
<div class="space-y-1">
<label class="font-label-sm text-label-sm text-outline uppercase">Surname</label>
<input class="w-full h-12 bg-surface-container-highest border-0 border-b-2 border-transparent focus:border-surface-tint focus:bg-surface-container-lowest transition-all px-4 font-body-md text-on-surface outline-none" placeholder="Enter surname" type="text"/>
</div>
<div class="space-y-1">
<label class="font-label-sm text-label-sm text-outline uppercase">Name</label>
<input class="w-full h-12 bg-surface-container-highest border-0 border-b-2 border-transparent focus:border-surface-tint focus:bg-surface-container-lowest transition-all px-4 font-body-md text-on-surface outline-none" placeholder="Enter name" type="text"/>
</div>
<div class="space-y-1">
<label class="font-label-sm text-label-sm text-outline uppercase">Patronymic</label>
<input class="w-full h-12 bg-surface-container-highest border-0 border-b-2 border-transparent focus:border-surface-tint focus:bg-surface-container-lowest transition-all px-4 font-body-md text-on-surface outline-none" placeholder="Optional" type="text"/>
</div>
</div>
</div>
<!-- Group 3: Account -->
<div class="space-y-module-gap">
<h3 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest mb-4">Account</h3>
<div class="space-y-1 relative">
<label class="font-label-sm text-label-sm text-outline uppercase">Login / Email</label>
<div class="relative group">
<input class="w-full h-12 bg-surface-container-highest border-0 border-b-2 border-transparent focus:border-surface-tint focus:bg-surface-container-lowest transition-all px-4 pr-12 font-body-md text-on-surface outline-none" placeholder="user@vault-certify.com" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline text-[16px]">lock</span>
</div>
</div>
</div>
<!-- Group 4: Authorization -->
<div class="space-y-module-gap">
<h3 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest mb-4">Authorization</h3>
<div class="space-y-1">
<label class="font-label-sm text-label-sm text-outline uppercase">Role Selection</label>
<div class="relative">
<select class="w-full h-12 bg-surface-container-highest border-0 border-b-2 border-transparent focus:border-surface-tint focus:bg-surface-container-lowest transition-all px-4 font-body-md text-on-surface outline-none appearance-none">
<option disabled="" selected="" value="">Select user role</option>
<option>Administrator</option>
<option>Security Auditor</option>
<option>System Analyst</option>
<option>Operator</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
</div>
</div>
<!-- Footer -->
<div class="px-section-gap py-module-gap bg-surface-container-low flex flex-col gap-4">
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<button class="font-label-md text-label-md text-outline hover:bg-surface-container-high transition-colors px-4 py-2 rounded-lg">Clear</button>
<button class="font-label-md text-label-md text-outline hover:bg-surface-container-high transition-colors px-4 py-2 rounded-lg">Cancel</button>
</div>
<button class="primary-gradient font-label-md text-label-md text-on-primary px-10 py-3 rounded-lg hover:brightness-110 transition-all flex items-center gap-2">
<span>Save User Profile</span>
<span class="material-symbols-outlined text-[18px]">verified_user</span>
</button>
</div>
<!-- Encryption Ribbon / Secure Indicator -->
<div class="border-t border-outline-variant/10 pt-4 flex items-center justify-center gap-2">
<div class="w-2 h-2 rounded-full bg-surface-tint animate-pulse"></div>
<span class="font-label-sm text-label-sm text-outline uppercase">Secure End-to-End Encrypted Session Active</span>
</div>
</div>
</div>
<div class="absolute left-[calc(50%+340px)] top-[60%] -translate-y-1/2 w-72 bg-amber-50 p-module-gap rounded-xl shadow-lg transform transition-all hover:scale-[1.02] z-30">
<div class="flex items-center gap-base mb-3 text-amber-900">
<span class="material-symbols-outlined text-[20px]">help</span>
<h4 class="font-label-md text-label-md uppercase tracking-wide">Annotation</h4>
</div>
<div class="space-y-base">
<label class="font-label-sm text-label-sm text-amber-800/70 uppercase">Clarification Required / Question for Stakeholders</label>
<textarea class="w-full h-32 bg-amber-100/50 border-0 border-b-2 border-transparent focus:border-amber-400 focus:bg-amber-100 transition-all p-3 font-body-md text-amber-950 placeholder:text-amber-700/40 outline-none resize-none" placeholder="Type question about Role Selection logic here..."></textarea>
</div>
<div class="mt-4 flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></div>
<span class="font-label-sm text-label-sm text-amber-800 italic uppercase">Disputed Moment Tracking</span>
</div>
<!-- Connector Tip -->
<div class="absolute -left-2 top-1/2 -translate-y-1/2 w-4 h-4 bg-amber-50 rotate-45"></div>
</div></div>
<!-- Background Decoration Image (Abstract Architecture) -->
<div class="fixed bottom-0 right-0 p-8 opacity-20 -z-10 pointer-events-none">
<img alt="Architectural detailing" class="w-96 grayscale" data-alt="A macro architectural photograph showcasing clean geometric lines and tonal layering of high-end corporate building facades. The lighting is cold and clinical, emphasizing the professional and secure environment of an elite financial or security vault. The composition is minimal and editorial, featuring a monochromatic palette of slates, whites, and deep navy tones, reinforcing institutional authority." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBnooBpK0rq27WutTyGsfbZ3gtyoCcv5mDoOrdxO3-dI_L8bDQh0wOp5HoV4jDKa42Ea6Fls0tBGVFLV49yxOO3KDwKPILfnN_vCRqxf192_FfOGRZ4myQPjvVqBcZegVBmGqdIY4ueoGB8lEIx5B023zR_eHYYbymPlNPfikCXsC64yt31Oh0tq6ytMw1Me0fCelSDpGGV4a6t8bEi9b7yes_mQjNpvRE-XphmXuwrF5fthV2Us0gLHkHt8EKa-f2g_gW7pz8JnIc5"/>
</div>
</body></html>
